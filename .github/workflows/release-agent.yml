name: Release Agent Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build agent and uninstaller
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o "blinex-agent-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./client/cmd/agent
          go build -ldflags "-s -w" \
            -o "blinex-uninstall-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./client/cmd/uninstall

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blinex-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            blinex-agent-${{ matrix.goos }}-${{ matrix.goarch }}*
            blinex-uninstall-${{ matrix.goos }}-${{ matrix.goarch }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            install.sh
            uninstall.sh
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release on this repo
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/blinex-agent-*
            artifacts/blinex-uninstall-*

      - name: Publish to public blinex-agent repo
        env:
          GH_TOKEN: ${{ secrets.BLINEX_AGENT_PAT }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Clone public repo
          git clone https://x-access-token:${GH_TOKEN}@github.com/DJR-FP/blinex-agent.git blinex-agent

          # Copy install and uninstall scripts
          cp install.sh uninstall.sh blinex-agent/
          cd blinex-agent
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add install.sh uninstall.sh
          git diff --cached --quiet || git commit -m "update scripts from blinex ${TAG}"
          git push origin main

          # Delete existing release if re-tagging
          gh release delete "${TAG}" --repo DJR-FP/blinex-agent --yes 2>/dev/null || true

          # Create release with binaries
          gh release create "${TAG}" \
            --repo DJR-FP/blinex-agent \
            --title "Bline-X Agent ${TAG}" \
            --generate-notes \
            ../artifacts/blinex-agent-* \
            ../artifacts/blinex-uninstall-*
