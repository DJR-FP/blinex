name: Release Agent Binaries

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o meshnet-agent-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./client/cmd/agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshnet-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: meshnet-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/meshnet-agent-*
