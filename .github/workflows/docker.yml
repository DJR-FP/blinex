name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: djr-fp
  REPO: blinex

jobs:
  # Read the VERSION file once; all build jobs use it.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Read VERSION
        id: read
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

  build-management:
    name: Management Server
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push management
        uses: docker/build-push-action@v5
        with:
          context: .
          file: management/Dockerfile
          push: ${{ github.event_name == 'push' }}
          build-args: VERSION=${{ needs.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/management:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/management:v${{ needs.version.outputs.version }}

  build-signal:
    name: Signal Server
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push signal
        uses: docker/build-push-action@v5
        with:
          context: .
          file: signal/Dockerfile
          push: ${{ github.event_name == 'push' }}
          build-args: VERSION=${{ needs.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/signal:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/signal:v${{ needs.version.outputs.version }}

  build-relay:
    name: Relay Server
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push relay
        uses: docker/build-push-action@v5
        with:
          context: .
          file: relay/Dockerfile
          push: ${{ github.event_name == 'push' }}
          build-args: VERSION=${{ needs.version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/relay:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/relay:v${{ needs.version.outputs.version }}

  build-dashboard:
    name: Dashboard
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          file: dashboard/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/dashboard:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}/dashboard:v${{ needs.version.outputs.version }}
          build-args: |
            NEXT_PUBLIC_MGMT_API=http://localhost:8080
