services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: blinex
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-blinex-secret}"
      POSTGRES_DB: blinex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blinex"]
      interval: 5s
      timeout: 5s
      retries: 10

  management:
    image: ghcr.io/djr-fp/blinex/management:latest
    build:
      context: .
      dockerfile: management/Dockerfile
    restart: unless-stopped
    environment:
      MGMT_GRPC_ADDR: ":50051"
      MGMT_HTTP_ADDR: ":8080"
      MGMT_JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      MGMT_ADMIN_PASSWORD: "${MGMT_ADMIN_PASSWORD:-}"
      MGMT_NETWORK_CIDR: "100.64.0.0/10"
      MGMT_DNS_SUFFIX: "blinex"
      BLINEX_DEFAULT_KEY: "${BLINEX_DEFAULT_KEY:-BLINEX-DEFAULT-KEY}"
      DATABASE_URL: "host=postgres user=blinex password=${POSTGRES_PASSWORD:-blinex-secret} dbname=blinex sslmode=disable"
    ports:
      - "50051:50051"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  signal:
    image: ghcr.io/djr-fp/blinex/signal:latest
    build:
      context: .
      dockerfile: signal/Dockerfile
    restart: unless-stopped
    environment:
      SIGNAL_ADDR: ":10000"
    ports:
      - "10000:10000"

  relay:
    image: ghcr.io/djr-fp/blinex/relay:latest
    build:
      context: .
      dockerfile: relay/Dockerfile
    restart: unless-stopped
    environment:
      RELAY_PUBLIC_IP: "${RELAY_PUBLIC_IP:-127.0.0.1}"
      RELAY_UDP_PORT: "3478"
      RELAY_REALM: "blinex.co.uk"
      RELAY_AUTH_USER: "blinex"
      RELAY_AUTH_PASS: "${RELAY_AUTH_PASS:-change-me-in-production}"
    ports:
      - "3478:3478/udp"

  dashboard:
    image: ghcr.io/djr-fp/blinex/dashboard:latest
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_MGMT_API: "${NEXT_PUBLIC_MGMT_API:-http://localhost:8080}"
    restart: unless-stopped
    environment:
      MGMT_API_URL: "${MGMT_API_URL:-https://management:8080}"
    ports:
      - "3000:3000"
    depends_on:
      - management

volumes:
  postgres_data:

networks:
  default:
    external:
      name: lab1
