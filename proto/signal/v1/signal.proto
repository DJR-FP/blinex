syntax = "proto3";

package signal.v1;

option go_package = "github.com/blinex/gen/signal/v1;signalv1";

service SignalService {
  // Bidirectional stream used by peers to exchange ICE candidates and
  // WireGuard connection offers/answers for NAT traversal.
  rpc Send(stream Message) returns (stream Message);
}

message Message {
  string key        = 1; // sender's WireGuard public key (base64)
  string remote_key = 2; // recipient's WireGuard public key (base64)
  Body   body       = 3;
}

message Body {
  Type   type    = 1;
  string payload = 2; // JSON-encoded ICE offer or answer
  bytes  data    = 3; // raw packet data for RELAY type

  enum Type {
    OFFER     = 0;
    ANSWER    = 1;
    CANDIDATE = 2;
    MODE      = 3;
    RELAY     = 4; // WireGuard packet relay (DERP-style)
  }
}
